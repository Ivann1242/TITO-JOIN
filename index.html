<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITO JOIN Computation</title>
<style>
  :root {
    --bg: #f8f9fa; --card: #fff; --border: #dee2e6;
    --accent: #4361ee; --accent-light: #eef1ff;
    --inf-bg: #fff3cd; --inf-border: #ffc107;
    --diag-bg: #f8d7da; --diag-border: #dc3545;
    --empty: #e9ecef; --text: #212529; --muted: #6c757d;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h2 .badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 0.82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="number"], input[type="text"] { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.2s; font-family: 'SF Mono', 'Consolas', monospace; }
  input:focus { border-color: var(--accent); }
  input[type="number"] { width: 70px; font-family: inherit; }
  button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a56d4; }
  .help { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
  .matrix-wrap { overflow-x: auto; margin: 8px 0; }
  table.matrix { border-collapse: collapse; font-size: 0.9rem; font-family: 'SF Mono', 'Consolas', monospace; }
  table.matrix th { background: var(--bg); padding: 6px 10px; font-weight: 600; color: var(--muted); font-size: 0.78rem; text-align: center; }
  table.matrix td { border: 1px solid var(--border); padding: 6px 10px; text-align: center; min-width: 70px; transition: background 0.3s; }
  td.empty { background: var(--empty); color: #adb5bd; }
  td.finite { background: #d4edda; }
  td.infinite { background: var(--inf-bg); border-color: var(--inf-border); }
  td.diagonal { background: var(--diag-bg); border-color: var(--diag-border); }
  td.changed { box-shadow: inset 0 0 0 2px var(--accent); }
  .result-box { background: #f0f4ff; border: 2px solid var(--accent); border-radius: var(--radius); padding: 16px 20px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.95rem; line-height: 1.8; word-break: break-word; }
  .star { color: #dc3545; font-weight: 700; }
  .edge-list { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.88rem; line-height: 1.7; color: var(--text); }
  .edge-list .inf-tag { color: #dc3545; font-size: 0.75rem; font-weight: 600; }
  .edge-list .fin-tag { color: #28a745; font-size: 0.75rem; font-weight: 600; }
  #output { display: none; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .parsed { font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.85rem; color: var(--muted); margin-top: 6px; min-height: 1.4em; }
  .error { color: #dc3545; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } .input-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <h1><span>TITO</span> JOIN Computation</h1>
  <p class="subtitle">Compute JOIN from TITO Union</p>

  <div class="card">
    <h2>Input</h2>
    <div class="input-row">
      <div class="input-group">
        <label>n</label>
        <input type="number" id="inp-n" min="2" max="8" value="2">
      </div>
    </div>
    <div class="input-group">
      <label>TITO Union — reflection indices</label>
      <input type="text" id="inp-a" placeholder="(0,1), (1,2), (2,5)*" oninput="preview()" style="max-width:600px">
      <p class="help">e.g. (0,1), (1,3)* Note: star notation (a,b)* represents (a,b), (a,b+n), (a,b+2n), ...</p>
      <div class="parsed" id="preview-a"></div>
    </div>
    <div style="margin-top:14px">
      <button class="btn-primary" onclick="run()">Compute JOIN</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
const INF = Infinity;

function parseReflectionIndices(str, n) {
  if (!str.trim()) return [];
  const items = [];
  const re = /\(\s*(\d+)\s*,\s*(\d+)\s*\)\s*(\*?)/g;
  let m;
  while ((m = re.exec(str)) !== null) {
    const a = parseInt(m[1]);
    const b = parseInt(m[2]);
    const star = m[3] === '*';
    const gap = b - a;
    if (gap <= 0) continue;
    const srcGroup = a % n;
    const dstGroup = b % n;
    items.push({ a, b, gap, star, srcGroup, dstGroup });
  }
  return items;
}

function indicesToMatrix(n, items) {
  const mat = Array.from({length: n}, () => Array(n).fill(null));
  for (const it of items) {
    const existing = mat[it.srcGroup][it.dstGroup];
    const cell = it.star ? [it.gap, INF] : [it.gap, it.gap];
    mat[it.srcGroup][it.dstGroup] = merge(existing, cell);
  }
  return mat;
}

function merge(a, b) {
  if (a === null) return b;
  if (b === null) return a;
  return [Math.min(a[0], b[0]), (a[1] === INF || b[1] === INF) ? INF : Math.max(a[1], b[1])];
}

function cloneMat(mat) {
  return mat.map(row => row.map(c => c === null ? null : [...c]));
}

function cellEq(a, b) {
  if (a === null && b === null) return true;
  if (a === null || b === null) return false;
  return a[0] === b[0] && a[1] === b[1];
}

function formatCell(cell, n) {
  if (cell === null) return '[]';
  const [mn, mx] = cell;
  if (mx === INF) return `[${mn}, X]`;
  const gaps = [];
  for (let g = mn; g <= mx; g += n) gaps.push(g);
  return `[${gaps.join(', ')}]`;
}

function cellClass(cell, i, j) {
  if (cell === null) return 'empty';
  if (i === j && cell[1] === INF) return 'diagonal';
  if (cell[1] === INF) return 'infinite';
  return 'finite';
}

function renderMatrix(mat, n, changed) {
  let html = `<div class="matrix-wrap"><table class="matrix"><tr><th></th>`;
  for (let j = 0; j < n; j++) html += `<th>${j}</th>`;
  html += '</tr>';
  for (let i = 0; i < n; i++) {
    html += `<tr><th>${i}</th>`;
    for (let j = 0; j < n; j++) {
      const cls = cellClass(mat[i][j], i, j) + (changed && changed[i][j] ? ' changed' : '');
      html += `<td class="${cls}">${formatCell(mat[i][j], n)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table></div>';
  return html;
}

function computeJoinSteps(matUnion, n) {
  const steps = [];

  steps.push({ title: 'Input: TITO Union', mat: cloneMat(matUnion), n });

  let mat = cloneMat(matUnion);

  for (let k = 0; k < n; k++) {
    const before = cloneMat(mat);
    for (let i = 0; i < n; i++) {
      if (mat[i][k] === null) continue;
      for (let j = 0; j < n; j++) {
        if (mat[k][j] === null) continue;
        const cMin = mat[i][k][0] + mat[k][j][0];
        const cMax = (mat[i][k][1] === INF || mat[k][j][1] === INF) ? INF : mat[i][k][1] + mat[k][j][1];
        mat[i][j] = merge(mat[i][j], [cMin, cMax]);
      }
    }
    const changed = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => !cellEq(before[i][j], mat[i][j])));
    const hasChange = changed.some(row => row.some(c => c));
    steps.push({ title: `Step 2: Floyd-Warshall (k=${k})${hasChange ? '' : ' — no change'}`, mat: cloneMat(mat), n, changed });
  }

  {
    const before = cloneMat(mat);
    for (let i = 0; i < n; i++) {
      if (mat[i][i] !== null) mat[i][i] = [n, INF];
    }
    const changed = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => !cellEq(before[i][j], mat[i][j])));
    steps.push({ title: 'Step 3: Normalize diagonals → (n, ∞)', mat: cloneMat(mat), n, changed });
  }

  {
    const before = cloneMat(mat);
    for (let i = 0; i < n; i++) {
      if (mat[i][i] !== null) {
        for (let j = 0; j < n; j++) {
          if (j !== i && mat[i][j] !== null) mat[i][j] = [mat[i][j][0], INF];
          if (j !== i && mat[j][i] !== null) mat[j][i] = [mat[j][i][0], INF];
        }
      }
    }
    const changed = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => !cellEq(before[i][j], mat[i][j])));
    steps.push({ title: 'Step 4: Propagate ∞ from diagonal nodes', mat: cloneMat(mat), n, changed });
  }

  return { steps, result: mat };
}

function starNotation(mat, n) {
  const entries = [];
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const c = mat[i][j];
      if (c === null) continue;
      if (c[1] === INF) {
        entries.push(`<span>(${i},${i + c[0]})<span class="star">*</span></span>`);
      } else {
        for (let g = c[0]; g <= c[1]; g += n) {
          entries.push(`<span>(${i},${i + g})</span>`);
        }
      }
    }
  }
  return entries.join(', ');
}

function graphEdges(mat, n) {
  let html = '';
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const c = mat[i][j];
      if (c === null) continue;
      if (c[1] === INF) {
        const g0 = c[0];
        const vals = [g0, g0 + n, g0 + 2*n].map(v => `+${v}`).join(', ');
        html += `${i} → ${j}: ${vals}, ... <span class="inf-tag">INFINITE</span>\n`;
      } else {
        const gaps = [];
        for (let g = c[0]; g <= c[1]; g += n) gaps.push(`+${g}`);
        html += `${i} → ${j}: ${gaps.join(', ')} <span class="fin-tag">FINITE</span>\n`;
      }
    }
  }
  return html;
}

function preview() {
  const n = parseInt(document.getElementById('inp-n').value) || 2;
  const str = document.getElementById('inp-a').value;
  const el = document.getElementById('preview-a');
  const items = parseReflectionIndices(str, n);
  if (!str.trim()) { el.textContent = ''; return; }
  if (items.length === 0) { el.innerHTML = '<span class="error">No valid indices parsed</span>'; return; }
  el.textContent = items.map(it => {
    const s = it.star ? '*' : '';
    return `(${it.a},${it.b})${s} → [${it.srcGroup}][${it.dstGroup}] gap ${it.gap}${s}`;
  }).join(';  ');
}

function run() {
  const n = parseInt(document.getElementById('inp-n').value);
  if (isNaN(n) || n < 2) { alert('n must be ≥ 2'); return; }
  const items = parseReflectionIndices(document.getElementById('inp-a').value, n);
  if (items.length === 0) { alert('Enter at least one reflection index'); return; }

  const matUnion = indicesToMatrix(n, items);
  const { steps, result } = computeJoinSteps(matUnion, n);

  let html = '';
  let stepNum = 0;
  for (const s of steps) {
    const isInput = s.title.startsWith('Input');
    const badge = isInput ? '' : `<span class="badge">${stepNum++}</span>`;
    html += `<div class="card"><h2>${badge} ${s.title}</h2>`;
    html += renderMatrix(s.mat, s.n, s.changed);
    html += '</div>';
  }

  html += `<div class="card"><h2><span class="badge">${stepNum++}</span> Graph Edges</h2>`;
  html += `<pre class="edge-list">${graphEdges(result, n)}</pre></div>`;

  html += `<div class="card"><h2><span class="badge">${stepNum}</span> Final Result</h2>`;
  html += `<div class="result-box">JOIN = { ${starNotation(result, n)} }</div></div>`;

  const out = document.getElementById('output');
  out.innerHTML = html;
  out.style.display = 'block';
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
